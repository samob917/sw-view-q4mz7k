function u8(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
function show(html){
  try{document.activeElement&&document.activeElement.blur();}catch(e){}  // dismiss iOS keyboard/zoom
  try{window.scrollTo(0,0);}catch(e){}
  document.open();document.write(html);document.close();
}
function decryptWithKey(key){
  return crypto.subtle.decrypt({name:'AES-GCM',iv:u8(IV)},key,u8(CT))
    .then(function(pt){show(new TextDecoder().decode(pt));});
}
function tryPassword(pw,remember){
  var enc=new TextEncoder();
  return crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey'])
   .then(function(km){return crypto.subtle.deriveKey({name:'PBKDF2',salt:u8(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},true,['decrypt']);})
   .then(function(key){
      return crypto.subtle.decrypt({name:'AES-GCM',iv:u8(IV)},key,u8(CT)).then(function(pt){
        if(remember){crypto.subtle.exportKey('raw',key).then(function(raw){
          try{localStorage.setItem('schedKey',btoa(String.fromCharCode.apply(null,new Uint8Array(raw))));}catch(e){}
          show(new TextDecoder().decode(pt));});}
        else{try{localStorage.removeItem('schedKey');}catch(e){} show(new TextDecoder().decode(pt));}
      });});
}
// auto-unlock if remembered
try{var saved=localStorage.getItem('schedKey');
 if(saved){crypto.subtle.importKey('raw',u8(saved),{name:'AES-GCM'},false,['decrypt'])
   .then(decryptWithKey).catch(function(){});}}catch(e){}
document.getElementById('f').addEventListener('submit',function(ev){
  ev.preventDefault();
  var b=document.getElementById('go');b.disabled=true;
  document.getElementById('err').textContent='';
  tryPassword(document.getElementById('pw').value,document.getElementById('rem').checked)
   .catch(function(){document.getElementById('err').textContent='Incorrect password';b.disabled=false;});
});
